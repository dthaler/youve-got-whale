---
name: NotificationFunction

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual workflow invocation from the Github Actions UI

env:
  DOTNET_VERSION: 8.0.x
  WORKING_DIR: NotificationFunction
  PUBLISH_DIR: output

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check for file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - NotificationFunction/**
              - NotificationFunction.Tests.Unit/**
              - NotificationFunction.Tests.Integration/**
              - NotificationFunction.sln
              - .github/workflows/NotificationFunction.yml

  build-ubuntu:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        run: dotnet restore NotificationFunction.sln
      - name: Build
        run: dotnet build NotificationFunction.sln --no-restore -c Release
      - name: Unit Tests
        run: dotnet test NotificationFunction.Tests.Unit --no-build -c Release
      - name: Integration Tests
        run: dotnet test NotificationFunction.Tests.Integration --no-build -c Release
      - name: Publish
        run: dotnet publish ${{ env.WORKING_DIR }}/NotificationFunction.csproj --no-build -c Release -o ./${{ env.WORKING_DIR }}/${{ env.PUBLISH_DIR }}
      - name: Cache published artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ./${{ env.WORKING_DIR }}/${{ env.PUBLISH_DIR }}
          key: ${{ github.sha }}-notificationfunction-artifacts

  test-windows:
    runs-on: windows-latest
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        run: dotnet restore NotificationFunction.sln
      - name: Build
        run: dotnet build NotificationFunction.sln --no-restore -c Release
      - name: Unit Tests
        run: dotnet test NotificationFunction.Tests.Unit --no-build -c Release
      - name: Integration Tests
        run: dotnet test NotificationFunction.Tests.Integration --no-build -c Release

  deploy:
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-ubuntu
      - test-windows
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.src == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Restore published artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ./${{ env.WORKING_DIR }}/${{ env.PUBLISH_DIR }}
          key: ${{ github.sha }}-notificationfunction-artifacts
      - name: Deploy to Azure Functions
        uses: azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593  # v1.5.6
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME || github.event.repository.name }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: ./${{ env.WORKING_DIR }}/${{ env.PUBLISH_DIR }}
