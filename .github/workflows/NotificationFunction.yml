---
name: NotificationFunction

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual workflow invocation from the Github Actions UI

env:
  DOTNET_VERSION: 8.0.x
  WORKING_DIR: NotificationFunction
  PUBLISH_DIR: output
  AZURE_FUNCTIONAPP_NAME: youve-got-whale

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check for file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - NotificationFunction/**
              - NotificationFunction.Tests.Unit/**
              - NotificationFunction.Tests.Integration/**
              - NotificationFunction.sln
              - .github/workflows/NotificationFunction.yml

  build-ubuntu:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        run: dotnet restore NotificationFunction.sln
      - name: Build
        run: dotnet build NotificationFunction.sln --no-restore -c Release
      - name: Unit Tests
        run: dotnet test NotificationFunction.Tests.Unit --no-build -c Release
      - name: Integration Tests
        run: dotnet test NotificationFunction.Tests.Integration --no-build -c Release
      - name: Publish
        run: dotnet publish ${{ env.WORKING_DIR }}/NotificationFunction.csproj --no-build -c Release -o ${{ github.workspace }}/${{ env.WORKING_DIR }}/${{ env.PUBLISH_DIR }}
      - name: Upload published artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: notificationfunction-publish
          path: ${{ github.workspace }}/${{ env.WORKING_DIR }}/${{ env.PUBLISH_DIR }}
          if-no-files-found: error
  test-windows:
    runs-on: windows-latest
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        run: dotnet restore NotificationFunction.sln
      - name: Build
        run: dotnet build NotificationFunction.sln --no-restore -c Release
      - name: Unit Tests
        run: dotnet test NotificationFunction.Tests.Unit --no-build -c Release
      - name: Integration Tests
        run: dotnet test NotificationFunction.Tests.Integration --no-build -c Release

  deploy:
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-ubuntu
      - test-windows
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.src == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Download published artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: notificationfunction-publish
          path: ${{ github.workspace }}/${{ env.WORKING_DIR }}/${{ env.PUBLISH_DIR }}
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via Zip Deploy
        run: |
          cd ${{ github.workspace }}/${{ env.WORKING_DIR }}/${{ env.PUBLISH_DIR }}
          zip -r ../app.zip .
          az functionapp deployment source config-zip \
            --resource-group LiveSRKWNotificationSystem \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --src ../app.zip
